services:
  - type: web
    name: convertkit-api
    runtime: python
    rootDir: backend
    buildCommand: "cd ../frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    packages:
      - libreoffice